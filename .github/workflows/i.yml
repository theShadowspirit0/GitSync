name: Push Arabic Localization to New Branch

on:
  workflow_dispatch:

# إضافة المتغير البيئي لفرض استخدام Node 24 وضمان الأداء الأقصى
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  push_l10n:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # الترقية إلى v6 لدعم كامل لـ Node 24
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # الترقية إلى v4 (أو أحدث نسخة مستقرة في 2026)
      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: 3.35.2

      - name: Get Packages
        run: flutter pub get

      - name: Generate Localization Files
        run: flutter gen-l10n

      - name: Commit and Push to New Branch
        run: |
          git config --global user.name "Maher"
          git config --global user.email "actions@github.com"

          BRANCH_NAME="feat/add-professional-arabic-translation"
          
          # التأكد من مسح الفرع القديم محلياً لو وجد والبدء من جديد
          git branch -D $BRANCH_NAME || true
          git checkout -b $BRANCH_NAME

          # إضافة الملفات بدقة (المجلد وملف التقرير)
          git add lib/l10n/
          git add untranslated.txt

          if ! git diff --cached --quiet; then
            git commit -m "feat(l10n): integrate professional Arabic translation" \
                       -m "Summary: 
          - Updated Arabic resources.
          - Re-generated dart localization classes.
          - Verified with Node 24 environment."
            
            git push origin $BRANCH_NAME --force
          else
            echo "Everything is clean. No changes to push."
          fi
