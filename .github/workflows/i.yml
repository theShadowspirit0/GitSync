name: Clean Arabic L10n PR (Upstream Base)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UPSTREAM_URL: "https://github.com/ViscousPot/GitSync.git"

jobs:
  push_l10n:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Your Fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: 3.35.2

      - name: Get Packages
        run: flutter pub get

      - name: Generate Localization Files
        run: flutter gen-l10n

      - name: Rebase and Surgical Commit
        run: |
          git config --global user.name "Maher"
          git config --global user.email "actions@github.com"

          # 1. إضافة المستودع الأصلي كمرجع (Upstream)
          git remote add upstream ${{ env.UPSTREAM_URL }}
          git fetch upstream

          # 2. إنشاء فرع جديد ينطلق "حصراً" من المستودع الأصلي (لحظة النقاء)
          BRANCH_NAME="feat/professional-arabic-translation"
          
          # حذف الفرع محلياً لو كان موجوداً للبدء من جديد
          git branch -D $BRANCH_NAME || true
          git checkout -b $BRANCH_NAME upstream/main

          # 3. إضافة الملفات الأربعة "الناجية" من عملية التطهير
          # نستخدم -f للتأكد من تجاوز أي تجاهل (ignore) قديم
          git add -f lib/l10n/app_ar.arb
          git add -f lib/l10n/app_localizations_ar.dart
          git add -f lib/l10n/app_localizations.dart
          git add -f untranslated.txt

          # 4. الالتزام والرفع بالقوة للمستودع الخاص بك (Your Fork)
          if ! git diff --cached --quiet; then
            git commit -m "feat(l10n): add professional Arabic localization support" \
                       -m "Surgical update based on upstream/main:
          - Cleaned all workflow/release experiments.
          - Included only the 4 essential localization files."
            
            git push origin $BRANCH_NAME --force
          else
            echo "No changes detected. Everything is up to date with upstream!"
          fi
