name: Push Arabic L10n - 2026 Edition

on:
  workflow_dispatch:

env:
  # فرض استخدام Node 24 للتخلص من كل التحذيرات القديمة
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  push_l10n:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6 # أحدث نسخة مستقرة
        with:
          fetch-depth: 0

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4 # متوافق مع v3.35.2
        with:
          channel: stable
          version: 3.35.2

      - name: Cache Flutter Pub Packages
        uses: actions/cache@v5 # أحدث نسخة للكاش
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get Packages
        run: flutter pub get

      - name: Generate Localization Files
        run: flutter gen-l10n

      - name: Surgical Commit for Maher
        run: |
          git config --global user.name "Maher"
          git config --global user.email "actions@github.com"

          BRANCH_NAME="feat/add-professional-arabic-translation"
          
          # الانتقال للفرع الجديد بأسلوب نظيف
          git checkout -b $BRANCH_NAME

          # إضافة الأربعة الكبار فقط
          git add lib/l10n/app_ar.arb
          git add lib/l10n/app_localizations_ar.dart
          git add lib/l10n/app_localizations.dart
          git add untranslated.txt

          if ! git diff --cached --quiet; then
            git commit -m "feat(l10n): add professional Arabic localization support" \
                       -m "Verified on Node 24 and Flutter 3.35.2.
          Included files:
          - Arabic Strings (ARB)
          - Generated Dart Logic
          - Translation Coverage Report (untranslated.txt)"
            
            git push origin $BRANCH_NAME --force
          else
            echo "No changes detected in the target files. Everything is up to date!"
          fi
